name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Check
        run: bun run check:ci

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  publish-dist:
    needs: check-test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish dist branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_COMMIT: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
          BUILT_AT: ${{ github.event.head_commit.timestamp }}
        run: bash scripts/push-dist-branch.sh
